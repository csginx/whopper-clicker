<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whopper Clicker | The Ultimate Fast Food Idle Game</title>
    <meta name="description" content="Play Whopper Clicker! Idle clicker game where you click the famous Whopper burger to earn points, buy upgrades like Auto Grillers, and become the fast food king.">
    <meta name="keywords" content="Whopper Clicker, idle game, clicker game, fast food clicker, incremental game, HTML game">
    
    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Whopper Clicker | The Ultimate Fast Food Idle Game">
    <meta property="og:description" content="Click the Whopper, buy upgrades, and become the fast food king in this addictive browser game!">
    <meta property="og:image" content="whopper.png">
    <meta property="og:url" content="https://example.com/whopper-clicker"> <!-- Replace with actual URL when deployed -->
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Whopper Clicker">
    <meta name="twitter:description" content="Click the Whopper, buy upgrades, and become the fast food king!">
    <meta name="twitter:image" content="whopper.png">

    <!-- Google Fonts for Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Whopper Clicker",
      "description": "An addictive idle clicker game where you click a giant burger to earn points and purchase fast food upgrades.",
      "genre": ["Idle Simulator", "Clicker", "Incremental"],
      "playMode": "SinglePlayer",
      "applicationCategory": "Game",
      "operatingSystem": "WebBrowser"
    }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Interactive Game Section -->
        <main class="game-area">
            <header class="score-board">
                <h1><span id="score">0</span></h1>
                <p>Whoppers</p>
                <div class="wps">
                    <span id="wpsDisplay">0</span> Whoppers / sec
                </div>
            </header>
            
            <div class="burger-container" id="burgerContainer">
                <img src="whopper.png" alt="Giant Delicious Whopper Burger" id="mainBurger" class="burger-image">
            </div>
        </main>

        <!-- Upgrades Sidebar -->
        <aside class="store-sidebar">
            <div class="store-header">
                <h2>Upgrades</h2>
            </div>
            <div class="upgrades-list" id="upgradesList">
                <!-- Upgrades will be generated dynamically by JS -->
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
